{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - HotelMatch{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-7 col-lg-5">
        <div class="card">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <span class="brand-mark d-inline-flex align-items-center justify-content-center mb-3" style="width: 48px; height: 48px; border-radius: 14px; background: var(--brand-grad); color: #fff; font-size: 1.4rem;">
                        <i class="bi bi-compass-fill"></i>
                    </span>
                    <h3 class="mb-1">Welcome back</h3>
                    <p class="text-muted mb-0">Sign in to continue to Pausa Booking</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 mt-3">Login</button>
                </form>
                <p class="mt-4 mb-0 text-center text-muted">Don't have an account? <a href="{% url 'signup' %}">Sign Up</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
